<!-- Loading -->
<div class="loading-state" *ngIf="loading">
  <div class="spinner"></div>
  <p>Cargando servicios...</p>
</div>

<!-- Tabla de servicios -->
<div class="tabla-wrapper" *ngIf="!loading && servicios.length > 0">
  <table class="servicios-tabla">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Categoría</th>
        <th>Costo</th>
        <th>Fotos</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let s of servicios" [class.inactivo]="!s.activo">
        <td class="nombre-col">
          <div class="nombre-con-thumb">
            <div class="thumb" *ngIf="s.foto?.url" [style.backgroundImage]="'url(' + s.foto.url + ')'"></div>
            <div class="thumb placeholder" *ngIf="!s.foto?.url">
              <i class="fas fa-image"></i>
            </div>
            <div>
              <span class="serv-nombre">{{ s.nombre }}</span>
              <span class="serv-desc">{{ s.descripcion | slice:0:50 }}{{ s.descripcion?.length > 50 ? '...' : ''
                }}</span>
            </div>
          </div>
        </td>
        <td><span class="cat-badge">{{ getNombreCategoria(s) }}</span></td>
        <td class="precio-col">{{ formatCosto(s.costo) }}</td>
        <td>
          <div class="media-badges">
            <span class="media-badge" *ngIf="tieneFoto(s)">
              <i class="fas fa-camera"></i>
            </span>
            <span class="media-badge audio" *ngIf="tieneAudio(s)">
              <i class="fas fa-microphone"></i>
            </span>
            <span class="media-badge none" *ngIf="!tieneFoto(s) && !tieneAudio(s)">—</span>
          </div>
        </td>
        <td>
          <span class="status-badge" [class.activo]="s.activo" [class.inactivo-badge]="!s.activo">
            {{ s.activo ? 'Activo' : 'Inactivo' }}
          </span>
        </td>
        <td>
          <button class="btn-icon editar" (click)="onEditar(s)" title="Editar">
            <i class="fas fa-pen"></i>
          </button>
          <button class="btn-icon eliminar" (click)="onEliminar(s)" title="Eliminar">
            <i class="fas fa-trash"></i>
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<div class="empty-state" *ngIf="!loading && servicios.length === 0">
  <i class="fas fa-box-open"></i>
  <p>No hay servicios registrados.</p>
  <button class="btn-primary" (click)="nuevo.emit()">Crear primer servicio</button>
</div>
