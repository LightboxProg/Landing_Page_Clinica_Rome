<header id="header" class="navbar-header">
  <!-- Action Bar superior con contacto y redes -->
  <div class="action-bar">
    <div class="container action-bar-container">
      <div class="contact-details">
        <span class="contact-item slogan">¿Tienes alguna pregunta?</span>
        <span class="contact-item phone">
          <i class="fa-solid fa-phone"></i>
          <a class="phone" href="tel:+524491234567">+52 449 123 4567</a>
        </span>
        <span class="contact-item email">
          <i class="fa-solid fa-envelope"></i>
          <a class="mail" href="mailto:contacto&#64;clinicarome.com">contacto&#64;clinicarome.com</a>
        </span>
      </div>
      <div class="social-links">
        <a href="#" aria-label="Facebook" class="social-link">
          <i class="fab fa-facebook-f"></i>
        </a>
        <a href="#" aria-label="Instagram" class="social-link">
          <i class="fab fa-instagram"></i>
        </a>
      </div>
    </div>
  </div>

  <!-- Barra de navegación principal -->
  <div class="top-bar">
    <div class="container top-bar-container">
      <!-- Logo -->
      <div class="logo-wrapper">
        <a routerLink="/" class="logo-link" aria-label="Inicio">
          <img src="assets/images/rome-logo-blanco.webp" alt="Clínica Rome" class="logo-img" />
        </a>
      </div>

      <!-- Menú de navegación -->
      <nav class="main-nav" [class.active]="menuOpen">
        <ul class="nav-menu">
          <li routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}">
            <a routerLink="/">Inicio</a>
          </li>
          <li routerLinkActive="active-link">
            <a routerLink="/servicios">Servicios</a>
          </li>
          <li routerLinkActive="active-link">
            <a routerLink="/membresias">Membresías</a>
          </li>
          <li routerLinkActive="active-link">
            <a routerLink="/nosotros">Nosotros</a>
          </li>
          <li routerLinkActive="active-link">
            <a routerLink="/contacto">Contacto</a>
          </li>
          <li routerLinkActive="active-link">
            <a routerLink="/aviso-privacidad">Aviso de Privacidad</a>
          </li>
          <li routerLinkActive="active-link">
            <a routerLink="/aviso-terminos">Aviso de Términos</a>
          </li>
        </ul>
      </nav>

      <!-- Botón de acción -->
      <div class="header-cta">
        <!-- Si la ruta /agendar-cita aún no existe, puedes cambiarla temporalmente a '#' o crearla después -->
        <a routerLink="/agendar-cita" class="cta-button">
          <span>Agendar Cita</span>
        </a>
      </div>

      <!-- Hamburguesa móvil -->
      <button class="mobile-toggle" (click)="toggleMenu()" [class.open]="menuOpen" aria-label="Menú">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>
